 messages. IR/PR engagement is also associated with a higher likelihood of costly and highly visible corporate responses, including CEO replacement, public equity offerings, and strategic reviews. Despite these defensive efforts, IR/PR-advised firms are significantly more likely to face SEC Accounting and Auditing Enforcement Releases (AAERs) within five years of the campaign, SEC comment letters within one to two years, and securities litigation and class action lawsuits within one year of the campaign. Taken together, the evidence suggests that external IR/PR engagement primarily reflects the severity of the underlying crisis and does not shield firms from regulatory scrutiny or legal exposure, notwithstanding"])</script><script>self.__next_f.push([1," active efforts to manage the information environment. These findings contribute to the literature on activist short selling, investor relations, and the role of communication intermediaries in capital markets.19:T843,"])</script><script>self.__next_f.push([1,"@workingpaper{liu2025digital,\n  title = {Short Changed? How Firms Use Investor Relations to Combat Activist Short Sellers},\n  author = {Janja Brendel and Sangtian Liu},\n  year = {2026},\n  langid = {english},\n  abstract = {We examine the role of external investor relations and public relations (IR/PR) advisory firms in activist short-selling campaigns. Using a sample of 1,019 U.S. short campaigns from 2002 to 2022, we investigate how IR/PR engagement shapes short interest dynamics, media narratives, social media activity, corporate response tactics, and subsequent regulatory and legal outcomes. We find that firms retaining external IR/PR advisors face significantly greater short-selling pressure prior to campaign announcements, consistent with reactive, crisis-driven engagement rather than proactive reputation management. Although IR/PR-advised firms issue more positive firm-sponsored press releases, they simultaneously attract more negative independent financial media coverage. On social media, these firms expand their Twitter presence more aggressively following short attacks, and short sellers targeting them experience notably weaker diffusion of their campaign messages. IR/PR engagement is also associated with a higher likelihood of costly and highly visible corporate responses, including CEO replacement, public equity offerings, and strategic reviews. Despite these defensive efforts, IR/PR-advised firms are significantly more likely to face SEC Accounting and Auditing Enforcement Releases (AAERs) within five years of the campaign, SEC comment letters within one to two years, and securities litigation and class action lawsuits within one year of the campaign. Taken together, the evidence suggests that external IR/PR engagement primarily reflects the severity of the underlying crisis and does not shield firms from regulatory scrutiny or legal exposure, notwithstanding active efforts to manage the information environment. These findings contribute to the literature on activist short selling, investor relations, and the role of communication intermediaries in capital markets.}\n}"])</script><script>self.__next_f.push([1,"9:[\"$\",\"$L17\",null,{\"dataByLocale\":{\"en\":{\"type\":\"publication\",\"config\":{\"type\":\"publication\",\"title\":\"Working Papers\",\"description\":\"A collection of my working papers.\",\"source\":\"working-papers.bib\"},\"publications\":[{\"id\":\"liu2025digital\",\"title\":\"Short Changed? How Firms Use Investor Relations to Combat Activist Short Sellers\",\"authors\":[{\"name\":\"Janja Brendel\",\"isHighlighted\":false,\"isCorresponding\":false,\"isCoAuthor\":false},{\"name\":\"Sangtian Liu\",\"isHighlighted\":true,\"isCorresponding\":false,\"isCoAuthor\":false}],\"year\":2026,\"type\":\"journal\",\"status\":\"published\",\"tags\":[\"activist short selling\",\"investor relations\",\"public relations\",\"media sentiment\",\"Twitter\",\"short interest\",\"regulatory outcomes\",\"corporate
